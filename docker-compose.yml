services:
  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "127.0.0.1:${WEB_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-wikichat}:${DB_PASSWORD:-changeme}@wikichat-db:5432/wikichat
      REDIS_URL: redis://wikichat-redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      PARSER_URL: http://parser:8000/parse
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - appnet
      - hetzner-network

  frontend:
    build:
      context: ./frontend
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-3084}:80"
    restart: unless-stopped
    networks:
      - hetzner-network

  db:
    image: pgvector/pgvector:pg17
    volumes:
      - data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${DB_USER:-wikichat}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: wikichat
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-wikichat}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      appnet:
        aliases:
          - wikichat-db

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
    restart: unless-stopped
    networks:
      appnet:
        aliases:
          - wikichat-redis

  parser:
    build: ./parser
    environment:
      PORT: 8000
    restart: unless-stopped
    networks:
      - appnet

volumes:
  data:
  redis-data:

networks:
  appnet:
  hetzner-network:
    external: true
